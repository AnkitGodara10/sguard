name: sguard
description: SGuard - College Campus Entry/Exit Tracking System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.5

  # Navigation
  go_router: ^16.0.0

  # Secure Storage (JWT/Auth Tokens)
  flutter_secure_storage: ^9.2.4

  # HTTP Client
  dio: ^5.9.0

  # QR Code Generation
  qr_flutter: ^4.1.0

  # QR Code Scanning
  mobile_scanner: ^7.1.1

  # Local Storage
  shared_preferences: ^2.5.3

  # Form Handling & Validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.2.0

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.0

  # UI Utilities
  gap: ^3.0.1
  cached_network_image: ^3.4.1

  # Dependency Injection
  get_it: ^8.2.0

  # Connectivity
  connectivity_plus: ^7.0.0

  # Notifications
  flutter_local_notifications: ^19.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/